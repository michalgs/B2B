name: Cypress E2E Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

defaults:
  run:
    working-directory: ./frontend

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
      - run: npm ci
      - run: npx eslint .

  cypress-run:
    runs-on: ubuntu-latest
    env:
      DB_PASSWORD: password
      JWT_SECRET: "mysecurelongandrandom32charsecretkey1234567890random"
      JWT_EXPIRATION: 3600000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start services with Docker Compose
        run: docker compose up -d

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          working-directory: ./frontend
          browser: chrome
          # Wait for the ports to be open
          wait-on: 'https://localhost:3000, http://localhost:8080/api/v1/health'
          wait-on-timeout: 180
          config: baseUrl=https://localhost:3000
        env:
          # Allow insecure certificates for local SSL and wait-on
          NODE_TLS_REJECT_UNAUTHORIZED: "0"

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots

      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: frontend/cypress/videos

      - name: Capture backend logs
        if: always()
        run: docker compose logs backend > backend-logs.txt

      - name: Print backend logs on failure
        if: failure()
        run: docker compose logs backend

      - name: Upload backend logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-logs
          path: backend-logs.txt
